name: Coldplay
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "16.2"

packages:
  ConfettiSwiftUI:
    url: https://github.com/simibac/ConfettiSwiftUI.git
    branch: master

settings:
  base:
    SWIFT_VERSION: "5.9"
    INFOPLIST_FILE: Coldplay/Info.plist
    GENERATE_INFOPLIST_FILE: true
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  Coldplay:
    type: application
    platform: iOS
    sources:
      - path: Coldplay
        excludes:
          - "**/*.plist"
    dependencies:
      - package: ConfettiSwiftUI
    settings:
      base:
        INFOPLIST_FILE: Coldplay/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.coldplay
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: 6HFVSLS63D
    info:
      path: Coldplay/Info.plist
      properties:
        NSCalendarsFullAccessUsageDescription: "考勤助手需要访问您的日历来同步上班和休息记录"
        UILaunchScreen: {}
    entitlements:
      path: Coldplay/Coldplay.entitlements
      properties: {}

  ColdplayTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ColdplayTests
    dependencies:
      - target: Coldplay
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.coldplay.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Coldplay.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Coldplay"
        BUNDLE_LOADER: "$(TEST_HOST)"
